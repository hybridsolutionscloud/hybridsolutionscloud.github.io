    <rect x="-16" y="-2" width="14" height="4" rx="1.5" fill="none" stroke="#0C4A6E" stroke-width="1"/>
    <rect x="-16" y="5" width="14" height="4" rx="1.5" fill="none" stroke="#0C4A6E" stroke-width="1"/>
