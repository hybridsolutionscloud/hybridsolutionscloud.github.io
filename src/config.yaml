site:
  name: 'Hybrid Cloud Solutions'
  site: 'https://www.hybridsolutions.cloud'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: eHvLZaLS4xs4_9XSGpucXQUOWjgxbXF62ByBpsWmVqU

# Default SEO metadata
metadata:
  title:
    default: 'Hybrid Cloud Solutions'
    template: '%s — Hybrid Cloud Solutions'
  description: 'From Azure Local to Hyper-V and Azure Arc — grounded, resilient hybrid solutions built for the edge and the enterprise.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Hybrid Cloud Solutions'
    images:
      - url: '~/assets/images/og-image.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@countrycloudboy'
    site: '@countrycloudboy'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: false

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-BSC6Y6ZB9G'

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
